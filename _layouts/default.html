<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/images/favicon.png" type="image/x-icon" />

    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>
    {% include meta.html %}

    <!-- MathJax (LaTeX) -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Site styles -->
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Icons for Back-to-top button -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YE7VVPT8CQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YE7VVPT8CQ');
    </script>

    <!-- Site scripts (defer: avoid blocking render) -->
    <script src="{{ site.baseurl }}/script.js" defer></script>
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.name }}"/></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav class="site-nav" aria-label="Primary">
            <a class="site-nav-link" href="{{ site.baseurl }}/">News</a>
            <a class="site-nav-link" href="{{ site.baseurl }}/blog">Blogs</a>
            <a class="site-nav-link" href="{{ site.baseurl }}/AboutMe">About Me</a>
            <a class="site-nav-link" href="{{ site.baseurl }}/research">Research</a>
            <a class="site-nav-link" href="{{ site.baseurl }}/Contact">Contact</a>
            <button
              id="menu-toggle"
              class="menu-icon"
              type="button"
              aria-expanded="false"
              aria-controls="menu"
              aria-label="Open main menu"
            >
              <span class="menu-icon-bar"></span>
              <span class="menu-icon-bar"></span>
              <span class="menu-icon-bar"></span>
            </button>
            <div class="menu" id="menu" aria-label="Mobile navigation">
              <a class="menu-link" href="{{ site.baseurl }}/">News</a>
              <a class="menu-link" href="{{ site.baseurl }}/blog">Blogs</a>
              <a class="menu-link" href="{{ site.baseurl }}/AboutMe">About Me</a>
              <a class="menu-link" href="{{ site.baseurl }}/research">Research</a>
              <a class="menu-link" href="{{ site.baseurl }}/Contact">Contact</a>
            </div>
          </nav>
        </header>
      </div>
    </div>

    <main id="main" role="main" class="container">
      {{ content }}
    </main>

    <button onclick="topFunction()" id="backToTop" aria-label="Back to top">
      <i class="fas fa-arrow-up"></i>
    </button>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
          <hr>
          <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
          <div class="site-footer-links">
            <script type='text/javascript' id='clustrmaps' src='//cdn.clustrmaps.com/map_v2.js?cl=ffffff&w=300&t=n&d=ZYjYZ0RsWvk6YIDH324LfcbQdw__BR_fi-ZPGPzBCgQ&co=2d78ad&ct=ffffff&cmo=3acc3a&cmn=ff5353'></script>
            <p>
              <a href="{{ site.baseurl }}/FTC">FTC 免責聲明</a>
              <a href="{{ site.baseurl }}/privacy">Privacy-Policy 隱私權政策</a>
            </p>
            <p>©Copyright 2024-2030 Boyi-Fu. All Rights Reserved.</p>
          </div>
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
